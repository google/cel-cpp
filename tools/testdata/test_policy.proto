// Test schema representing client-configured policies.
// It is used by the `proto_to_predicate` tool to translate Protobuf policies
// into CEL predicates.
edition = "2023";

package cel.cpp.tools;

option cc_enable_arenas = true;

// Represents the targeted client agent.
message Agent {
  string name = 1 [json_name = "id"];
}

// Specifies additional metadata tool annotations.
message ToolAnnotations {
  bool read_only_hint = 1;
}

// Represents a mapped nested message entry value inside map fields.
message Members {
  repeated string principals = 1;

  repeated string regions = 2;

  bool all_users = 3;

  bool all_authenticated_users = 4;
}

// Represents a metadata tool block.
message Tool {
  // The name of the tool.
  string name = 1;

  // Additional metadata annotations for the tool.
  ToolAnnotations annotations = 2;

  // A string-to-string map, transpiled as conjoined existence and equality
  // checks.
  map<string, string> labels = 3;

  // A map with string keys representing roles and Member instances as values.
  map<string, Members> role_members = 4;
}

// Represents a policy mapping destination block.
message Target {
  oneof kind {
    Agent agent = 1;
    Tool tool = 2;
  }
}

// Represents the top-level policy containing multiple alternate destination
// rules.
message Policy {
  repeated Target destinations = 1;
}
