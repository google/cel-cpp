name: cel_policy_custom_tags
description: A custom policy format
imports:
- name: cel.expr.conformance.proto3.TestAllTypes
purpose: test
version: 42
conditions:
- if: spec.single_string == "none"
  then: "'zero'"
  else:
    if: spec.single_string == "integer"
    then:
      if: spec.single_int32 > 0
      then: "'positive integer'"
      else: "'negative integer'"
    else: "'not an integer'"
