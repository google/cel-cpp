# Environment:
# spec: TestAllTypes
name: cel_policy
description: A test policy for CEL
display_name: Cel Policy
imports:
- name: cel.expr.conformance.proto3.TestAllTypes
- name: cel.expr.conformance.proto3.TestAllTypes.NestedEnum
rule:
  id: test_rule
  description: test rule description
  variables:
      - name: test_var
        expression: >
          TestAllTypes{single_int64: 10}.single_int64
  match:
  - condition: >
      spec.single_int32 > TestAllTypes{single_int64: 10}.single_int64
    output: |
      "invalid spec, got single_int32=" + string(spec.single_int32) + ", wanted <= 10"
    explanation: |
      "invalid spec, spec is greater than 10"
  - condition: >
      spec.standalone_enum == NestedEnum.BAR
    output: |
      "invalid spec, reference to BAR is not allowed"
  - condition: spec.single_int64 == variables.test_var
    output: '"invalid spec: exactly matches test_var"'
    explanation: '"the spec cannot have single_int64 set to a known bad value"'